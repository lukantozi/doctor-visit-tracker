{% extends 'base.html' %}

{% block content %}
<h1>Delete Visit</h1>

<form method="post">{% csrf_token %}
    <p>Are you sure you want to remove visit on {{ object.date }} with patient {{ object.person.first_name }} {{ object.person.last_name }} from the system?</p>
    <input type="submit" value="Confirm">
</form>

{% endblock %}
